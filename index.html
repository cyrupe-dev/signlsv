<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LSV - Aprende Lengua de Señas</title>
    <!-- Font Awesome 6 (gratuito) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Pantallas (Login / Register) */
        .screen {
            padding: 20px;
            width: 100%;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .screen.hidden {
            display: none;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
        }

        /* Formulario */
        .form-card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-container {
            display: flex;
            align-items: center;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 15px;
            background-color: #fff;
            transition: border-color 0.2s;
        }
        .input-container:focus-within {
            border-color: #6a11cb;
        }
        .input-icon {
            margin-right: 10px;
            color: #666;
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        .input-field {
            flex: 1;
            padding: 15px 0;
            font-size: 16px;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
        }
        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            color: #666;
            font-size: 18px;
        }
        .toggle-password:hover {
            color: #6a11cb;
        }

        /* Botones */
        .btn-primary {
            background-color: #6a11cb;
            padding: 15px;
            border-radius: 10px;
            border: none;
            width: 100%;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background-color: #5a0eb0;
        }
        .btn-primary:disabled {
            background-color: #aa8ed6;
            cursor: not-allowed;
        }
        .btn-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        .link-button {
            background: none;
            border: none;
            margin-top: 20px;
            text-align: center;
            width: 100%;
            cursor: pointer;
        }
        .link-text {
            font-size: 14px;
            color: #666;
        }
        .link-bold {
            color: #6a11cb;
            font-weight: bold;
        }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert personalizado */
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .alert-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            text-align: center;
        }
        .alert-message {
            margin-bottom: 20px;
            font-size: 16px;
        }
        .alert-button {
            background: #6a11cb;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }

        /* Utilidades */
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-2 {
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Pantalla de LOGIN -->
    <div id="loginScreen" class="screen">
        <div class="header">
            <div class="title">¡Bienvenido de vuelta!</div>
            <div class="subtitle">Inicia sesión para continuar aprendiendo</div>
        </div>
        <div class="form-card">
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" class="input-field" placeholder="Correo electrónico" autocomplete="email">
                </div>
            </div>
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" class="input-field" placeholder="Contraseña" autocomplete="current-password">
                    <button class="toggle-password" data-target="loginPassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
            <button id="loginBtn" class="btn-primary">
                <span id="loginBtnText" class="btn-text">Iniciar Sesión</span>
                <span id="loginLoader" class="loader hidden"></span>
            </button>
            <button id="goToRegisterLink" class="link-button">
                <span class="link-text">¿No tienes cuenta? <span class="link-bold">Regístrate</span></span>
            </button>
        </div>
    </div>

    <!-- Pantalla de REGISTRO -->
    <div id="registerScreen" class="screen hidden">
        <div class="header">
            <div class="title">Crear Cuenta</div>
            <div class="subtitle">Únete y comienza a aprender LSV</div>
        </div>
        <div class="form-card">
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="regUsername" class="input-field" placeholder="Nombre de usuario" autocomplete="username">
                </div>
            </div>
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="regEmail" class="input-field" placeholder="Correo electrónico" autocomplete="email">
                </div>
            </div>
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="regPassword" class="input-field" placeholder="Contraseña" autocomplete="new-password">
                    <button class="toggle-password" data-target="regPassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="input-group">
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="regConfirmPassword" class="input-field" placeholder="Confirmar contraseña">
                    <button class="toggle-password" data-target="regConfirmPassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
            <button id="registerBtn" class="btn-primary">
                <span id="registerBtnText" class="btn-text">Registrarse</span>
                <span id="registerLoader" class="loader hidden"></span>
            </button>
            <button id="goToLoginLink" class="link-button">
                <span class="link-text">¿Ya tienes cuenta? <span class="link-bold">Inicia Sesión</span></span>
            </button>
        </div>
    </div>
</div>

<!-- Alert personalizado -->
<div id="customAlert" class="alert-overlay hidden">
    <div class="alert-box">
        <div id="alertMessage" class="alert-message"></div>
        <button id="alertOkBtn" class="alert-button">Aceptar</button>
    </div>
</div>

<script>
    // ======================== Simulación de API usando localStorage ========================
    const STORAGE_USERS = 'lsc_users';
    const STORAGE_TOKEN = 'userToken';
    const STORAGE_USERDATA = 'userData';

    // Inicializar usuarios de ejemplo
    function initStorage() {
        if (!localStorage.getItem(STORAGE_USERS)) {
            const defaultUsers = [
                {
                    id: '1',
                    username: 'Cyrupe',
                    email: 'cyrupe@gmail.com',
                    password: '123456789'
                }
            ];
            localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
        }
    }

    // Mostrar alerta personalizada
    function showAlert(title, message) {
        const alertDiv = document.getElementById('customAlert');
        const msgSpan = document.getElementById('alertMessage');
        msgSpan.innerText = `${title}\n${message}`;
        alertDiv.classList.remove('hidden');
        const okBtn = document.getElementById('alertOkBtn');
        const closeHandler = () => {
            alertDiv.classList.add('hidden');
            okBtn.removeEventListener('click', closeHandler);
        };
        okBtn.addEventListener('click', closeHandler, { once: true });
    }

    // Login simulado
    async function loginUser(email, password) {
        const users = JSON.parse(localStorage.getItem(STORAGE_USERS) || '[]');
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
            const token = 'mock-jwt-token-' + Date.now();
            const userData = { id: user.id, username: user.username, email: user.email };
            localStorage.setItem(STORAGE_TOKEN, token);
            localStorage.setItem(STORAGE_USERDATA, JSON.stringify(userData));
            return { success: true, user: userData, token };
        } else {
            return { success: false, error: 'Credenciales inválidas' };
        }
    }

    // Registro simulado
    async function registerUser(username, email, password) {
        const users = JSON.parse(localStorage.getItem(STORAGE_USERS) || '[]');
        const existing = users.find(u => u.email === email);
        if (existing) {
            return { success: false, error: 'El correo electrónico ya está registrado' };
        }
        const newUser = {
            id: Date.now().toString(),
            username: username,
            email: email,
            password: password
        };
        users.push(newUser);
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        const token = 'mock-jwt-token-' + Date.now();
        const userData = { id: newUser.id, username: newUser.username, email: newUser.email };
        localStorage.setItem(STORAGE_TOKEN, token);
        localStorage.setItem(STORAGE_USERDATA, JSON.stringify(userData));
        return { success: true, user: userData, token };
    }

    // Redirigir a la página de aprendizaje
    function redirectToLearningApp() {
        window.location.href = 'aprende-lsv.html';
    }

    // ======================== UI Navigation ========================
    const loginScreen = document.getElementById('loginScreen');
    const registerScreen = document.getElementById('registerScreen');

    function showLogin() {
        loginScreen.classList.remove('hidden');
        registerScreen.classList.add('hidden');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    }

    function showRegister() {
        loginScreen.classList.add('hidden');
        registerScreen.classList.remove('hidden');
        document.getElementById('regUsername').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirmPassword').value = '';
    }

    // Estados de loading
    function setLoginLoading(loading) {
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('loginBtnText');
        const loader = document.getElementById('loginLoader');
        if (loading) {
            btn.disabled = true;
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
        } else {
            btn.disabled = false;
            btnText.classList.remove('hidden');
            loader.classList.add('hidden');
        }
    }

    function setRegisterLoading(loading) {
        const btn = document.getElementById('registerBtn');
        const btnText = document.getElementById('registerBtnText');
        const loader = document.getElementById('registerLoader');
        if (loading) {
            btn.disabled = true;
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
        } else {
            btn.disabled = false;
            btnText.classList.remove('hidden');
            loader.classList.add('hidden');
        }
    }

    // Handlers
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showAlert('Error', 'Por favor completa todos los campos');
            return;
        }

        setLoginLoading(true);
        try {
            const result = await loginUser(email, password);
            if (result.success) {
                showAlert('Éxito', `Bienvenido ${result.user.username}. Redirigiendo...`);
                setTimeout(() => {
                    redirectToLearningApp();
                }, 1500);
            } else {
                showAlert('Error', result.error || 'Credenciales inválidas');
            }
        } catch (error) {
            showAlert('Error', 'No se pudo conectar al servidor');
        } finally {
            setLoginLoading(false);
        }
    }

    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;

        if (!username || !email || !password || !confirmPassword) {
            showAlert('Error', 'Por favor completa todos los campos');
            return;
        }
        if (password !== confirmPassword) {
            showAlert('Error', 'Las contraseñas no coinciden');
            return;
        }
        if (password.length < 6) {
            showAlert('Error', 'La contraseña debe tener al menos 6 caracteres');
            return;
        }

        setRegisterLoading(true);
        try {
            const result = await registerUser(username, email, password);
            if (result.success) {
                showAlert('Éxito', `Cuenta creada para ${result.user.username}. Redirigiendo...`);
                setTimeout(() => {
                    redirectToLearningApp();
                }, 1500);
            } else {
                showAlert('Error', result.error || 'Error al registrar usuario');
            }
        } catch (error) {
            showAlert('Error', 'No se pudo conectar al servidor');
        } finally {
            setRegisterLoading(false);
        }
    }

    // Toggle mostrar/ocultar contraseña con cambio de ícono
    function setupPasswordToggles() {
        const toggles = document.querySelectorAll('.toggle-password');
        toggles.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = this.querySelector('i');
                
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    
                    // Cambiar ícono entre ojo abierto y cerrado
                    if (type === 'password') {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    } else {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    }
                }
            });
        });
    }

    // Verificar si ya hay sesión iniciada
    function checkExistingSession() {
        const token = localStorage.getItem(STORAGE_TOKEN);
        const userData = localStorage.getItem(STORAGE_USERDATA);
        if (token && userData) {
            redirectToLearningApp();
        }
    }

    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);
    document.getElementById('goToRegisterLink').addEventListener('click', showRegister);
    document.getElementById('goToLoginLink').addEventListener('click', showLogin);

    // Inicializar
    initStorage();
    setupPasswordToggles();
    checkExistingSession();
    showLogin();
</script>
</body>
</html>
